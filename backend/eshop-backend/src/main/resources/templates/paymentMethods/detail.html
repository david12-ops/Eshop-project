<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Payment Method Detail</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h2>Payment Method Detail</h2>

                    <a th:href="@{/paymentMethods}" class="btn btn-secondary">

                        Back

                    </a>

                </div>

                <table class="table table-bordered">

                    <tr>
                        <th>ID</th>
                        <td th:text="${paymentMethod.id}"></td>
                    </tr>

                    <tr>
                        <th>Method Name</th>
                        <td th:text="${paymentMethod.methodName}"></td>
                    </tr>

                    <tr>
                        <th>Method Type</th>
                        <td th:text="${paymentMethod.methodType}"></td>
                    </tr>

                    <tr>
                        <th>Description</th>
                        <td th:text="${paymentMethod.methodDescription}"></td>
                    </tr>

                    <tr>
                        <th>Created At</th>
                        <td th:text="${paymentMethod.createdAt}"></td>
                    </tr>

                    <tr>
                        <th>Updated At</th>
                        <td th:text="${paymentMethod.updatedAt}"></td>
                    </tr>

                </table>

                <div class="d-flex gap-2">

                    <a th:href="@{/paymentMethods/edit/{id}(id=${paymentMethod.id})}" class="btn btn-warning">

                        Edit

                    </a>

                    <form th:action="@{/paymentMethods/delete/{id}(id=${paymentMethod.id})}" method="post">

                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <button type="submit" class="btn btn-danger">

                            Delete

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
