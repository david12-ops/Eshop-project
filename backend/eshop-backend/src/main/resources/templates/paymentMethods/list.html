<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Payment Methods</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h1>Payment Methods</h1>

            <div class="d-flex gap-2">

                <a th:href="@{/}" class="btn btn-secondary">

                    Home

                </a>

                <a th:href="@{/paymentMethods/create}" class="btn btn-primary">

                    Create Payment Method

                </a>

            </div>

        </div>

        <table class="table table-bordered table-striped">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Method Name</th>
                    <th>Method Type</th>
                    <th>Description</th>
                    <th>Created At</th>
                    <th>Deleted</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="method : ${paymentMethods}">

                    <td th:text="${method.id}"></td>

                    <td th:text="${method.methodName}"></td>

                    <td th:text="${method.methodType}"></td>

                    <td th:text="${method.methodDescription}"></td>

                    <td th:text="${method.createdAt}"></td>

                    <td th:text="${method.deleted ? 'Deleted' : 'Active'}"></td>

                    <td>

                        <a th:href="@{/paymentMethods/detail/{id}(id=${method.id})}" class="btn btn-info btn-sm">

                            Detail

                        </a>

                        <a th:href="@{/paymentMethods/edit/{id}(id=${method.id})}" class="btn btn-warning btn-sm">

                            Edit

                        </a>

                        <form th:action="@{/paymentMethods/delete/{id}(id=${method.id})}" method="post"
                            style="display:inline-block">

                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                            <button type="submit" class="btn btn-danger btn-sm">

                                Delete

                            </button>

                        </form>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</body>

</html>
