<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Order Detail</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">

            <div class="d-flex gap-2">

                <a th:href="@{/orders}" class="btn btn-secondary">

                    Back

                </a>

                <a th:href="@{/orders/edit/{id}(id=${order.orderId})}" class="btn btn-warning">

                    Edit Order

                </a>

            </div>

            <h1 class="mb-0">

                Order Detail

            </h1>

        </div>

        <!-- ORDER INFO -->
        <div class="card mb-4">

            <div class="card-header bg-dark text-white">

                Order Information

            </div>

            <div class="card-body">

                <div class="row mb-2">

                    <div class="col-md-3 fw-bold">
                        Order ID
                    </div>

                    <div class="col-md-9" th:text="${order.orderId}">
                    </div>

                </div>

                <div class="row mb-2">

                    <div class="col-md-3 fw-bold">
                        Customer
                    </div>

                    <div class="col-md-9" th:text="${order.customer.firstName + ' ' + order.customer.lastName}">
                    </div>

                </div>

                <div class="row mb-2">

                    <div class="col-md-3 fw-bold">
                        Status
                    </div>

                    <div class="col-md-9">

                        <span class="badge bg-info"
                            th:text="${order.status != null ? order.status.statusName : 'No Status'}">
                        </span>

                    </div>

                </div>

                <div class="row mb-2">

                    <div class="col-md-3 fw-bold">
                        Currency
                    </div>

                    <div class="col-md-9" th:text="${order.currency.currencyCode}">
                    </div>

                </div>

                <div class="row mb-2">

                    <div class="col-md-3 fw-bold">
                        Order Date
                    </div>

                    <div class="col-md-9" th:text="${order.orderDate}">
                    </div>

                </div>

                <div class="row mb-2">

                    <div class="col-md-3 fw-bold">
                        Delivery Address
                    </div>

                    <div class="col-md-9">

                        <span th:text="${order.deliveryAddress.streetName}"></span>,
                        <span th:text="${order.deliveryAddress.cityName}"></span>

                    </div>

                </div>

                <div class="row mb-2">

                    <div class="col-md-3 fw-bold">
                        Subtotal
                    </div>

                    <div class="col-md-9" th:text="${order.subtotal}">
                    </div>

                </div>

                <div class="row mb-2">

                    <div class="col-md-3 fw-bold">
                        Tax
                    </div>

                    <div class="col-md-9" th:text="${order.taxAmount}">
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-3 fw-bold">
                        Total
                    </div>

                    <div class="col-md-9 fw-bold text-success" th:text="${order.totalAmount}">
                    </div>

                </div>

            </div>

        </div>

        <!-- ORDER ITEMS -->
        <div class="card mb-4">

            <div class="card-header d-flex justify-content-between align-items-center">

                <span class="fw-bold">

                    Order Items

                </span>

                <a th:href="@{/order-items/create/{id}(id=${order.orderId})}" class="btn btn-primary btn-sm">

                    Add Item

                </a>

            </div>

            <div class="card-body p-0">

                <table class="table table-bordered table-striped mb-0">

                    <thead class="table-light">

                        <tr>

                            <th>ID</th>
                            <th>Product ID</th>
                            <th>Quantity</th>
                            <th>Unit Price</th>
                            <th>Line Total</th>
                            <th>Notes</th>
                            <th>Actions</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr th:each="item : ${order.orderItems}">

                            <td th:text="${item.orderItemId}"></td>

                            <td th:text="${item.productId}"></td>

                            <td th:text="${item.quantity}"></td>

                            <td th:text="${item.unitPrice}"></td>

                            <td th:text="${item.lineTotal}"></td>

                            <td th:text="${item.notes}"></td>

                            <td>

                                <div class="d-flex gap-1">

                                    <a th:href="@{/order-items/edit/{id}(id=${item.orderItemId})}"
                                        class="btn btn-warning btn-sm">

                                        Edit

                                    </a>

                                    <form th:action="@{/order-items/delete/{id}(id=${item.orderItemId})}" method="post">

                                        <input type="hidden" th:name="${_csrf.parameterName}"
                                            th:value="${_csrf.token}" />

                                        <button type="submit" class="btn btn-danger btn-sm">

                                            Delete

                                        </button>

                                    </form>

                                </div>

                            </td>

                        </tr>

                        <tr th:if="${#sets.isEmpty(order.orderItems)}">

                            <td colspan="7" class="text-center text-muted py-4">

                                No items found

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

        <!-- DISCOUNTS -->
        <div class="card">

            <div class="card-header fw-bold">

                Applied Discounts

            </div>

            <div class="card-body">

                <div th:if="${#sets.isEmpty(order.discounts)}" class="text-muted">

                    No discounts applied

                </div>

                <div th:each="discount : ${order.discounts}" class="border rounded p-3 mb-2">

                    <div class="fw-bold" th:text="${discount.discountName}">
                    </div>

                    <div>

                        Code:
                        <span th:text="${discount.discountCode}"></span>

                    </div>

                    <div>

                        Value:
                        <span th:text="${discount.discountValue}"></span>

                    </div>

                    <div>

                        Type:
                        <span th:text="${discount.discountType}"></span>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
