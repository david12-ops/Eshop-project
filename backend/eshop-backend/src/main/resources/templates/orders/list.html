<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Orders</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h1>Orders</h1>

            <a th:href="@{/orders/create}" class="btn btn-primary">
                Create Order
            </a>

        </div>

        <table class="table table-bordered table-striped">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Customer</th>
                    <th>Order Date</th>
                    <th>Status</th>
                    <th>Currency</th>
                    <th>Total Amount</th>
                    <th>Created At</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="order : ${orders}">

                    <td th:text="${order.id}"></td>

                    <td th:text="${order.customer != null ? order.customer.customerId : '-'}"></td>

                    <td th:text="${order.orderDate}"></td>

                    <td th:text="${order.status != null ? order.status.statusName : '-'}"></td>

                    <td th:text="${order.currencyCode}"></td>

                    <td th:text="${order.totalAmount}"></td>

                    <td th:text="${order.createdAt}"></td>

                    <td>

                        <a th:href="@{/orders/detail/{id}(id=${order.id})}" class="btn btn-info btn-sm">
                            Detail
                        </a>

                        <a th:href="@{/orders/edit/{id}(id=${order.id})}" class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <form th:action="@{/orders/delete/{id}(id=${order.id})}" method="post"
                            style="display:inline-block">

                            <button type="submit" class="btn btn-danger btn-sm">
                                Delete
                            </button>

                        </form>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</body>

</html>
