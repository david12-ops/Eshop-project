<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Orders</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h1>Orders</h1>

            <div class="d-flex gap-2">

                <a th:href="@{/}" class="btn btn-secondary">

                    Home

                </a>

                <a th:href="@{/orders/create}" class="btn btn-primary">

                    Create Order

                </a>

            </div>

        </div>

        <table class="table table-bordered table-striped">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Customer</th>
                    <th>Status</th>
                    <th>Currency</th>
                    <th>Order Date</th>
                    <th>Subtotal</th>
                    <th>Tax</th>
                    <th>Total</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

                <tr th:each="order : ${orders}">

                    <td th:text="${order.orderId}"></td>

                    <td>

                        <span th:text="${order.customer.firstName + ' ' + order.customer.lastName}">
                        </span>

                    </td>

                    <td>

                        <span th:text="${order.status != null ? order.status.statusName : '-'}">
                        </span>

                    </td>

                    <td th:text="${order.currency.currencyCode}"></td>

                    <td th:text="${order.orderDate}"></td>

                    <td th:text="${order.subtotal}"></td>

                    <td th:text="${order.taxAmount}"></td>

                    <td class="fw-bold text-success" th:text="${order.totalAmount}">
                    </td>

                    <td>

                        <a th:href="@{/orders/detail/{id}(id=${order.orderId})}" class="btn btn-info btn-sm">

                            Detail

                        </a>

                        <a th:href="@{/orders/edit/{id}(id=${order.orderId})}" class="btn btn-warning btn-sm">

                            Edit

                        </a>

                        <form th:action="@{/orders/delete/{id}(id=${order.orderId})}" method="post"
                            style="display:inline-block">

                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                            <button type="submit" class="btn btn-danger btn-sm">

                                Delete

                            </button>

                        </form>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</body>

</html>
