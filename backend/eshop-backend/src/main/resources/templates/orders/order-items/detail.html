<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Order Item Detail</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h2>Order Item Detail</h2>

                    <a th:href="@{/orders/detail/{id}(id=${orderItem.order.orderId})}" class="btn btn-secondary">

                        Back

                    </a>

                </div>

                <table class="table table-bordered">

                    <tr>
                        <th>Order Item ID</th>
                        <td th:text="${orderItem.orderItemId}"></td>
                    </tr>

                    <tr>
                        <th>Order ID</th>
                        <td th:text="${orderItem.order.orderId}"></td>
                    </tr>

                    <tr>
                        <th>Product ID</th>
                        <td th:text="${orderItem.productId}"></td>
                    </tr>

                    <tr>
                        <th>Quantity</th>
                        <td th:text="${orderItem.quantity}"></td>
                    </tr>

                    <tr>
                        <th>Unit Price</th>
                        <td th:text="${orderItem.unitPrice}"></td>
                    </tr>

                    <tr>
                        <th>Line Total</th>
                        <td th:text="${orderItem.lineTotal}"></td>
                    </tr>

                    <tr>
                        <th>Notes</th>
                        <td th:text="${orderItem.notes}"></td>
                    </tr>

                    <tr>
                        <th>Deleted</th>
                        <td th:text="${orderItem.deleted ? 'Deleted' : 'Active'}"></td>
                    </tr>

                    <tr>
                        <th>Deleted At</th>
                        <td th:text="${orderItem.deletedAt != null ? orderItem.deletedAt : '-'}"></td>
                    </tr>

                </table>

            </div>

        </div>

    </div>

</body>

</html>
