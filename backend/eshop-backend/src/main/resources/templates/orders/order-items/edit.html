<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Edit Order Item</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h2>Edit Order Item</h2>

                    <a th:href="@{/orders/detail/{id}(id=${orderItem.order.orderId})}" class="btn btn-secondary">

                        Back

                    </a>

                </div>

                <form th:action="@{/order-items/edit/{id}(id=${orderItem.orderItemId})}" th:object="${orderItem}"
                    method="post">

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="mb-3">

                        <label class="form-label">Product ID</label>

                        <input type="number" class="form-control" th:field="*{productId}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Quantity</label>

                        <input type="number" class="form-control" th:field="*{quantity}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Unit Price</label>

                        <input type="number" step="0.01" class="form-control" th:field="*{unitPrice}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Line Total</label>

                        <input type="number" step="0.01" class="form-control" th:field="*{lineTotal}">

                    </div>

                    <div class="mb-4">

                        <label class="form-label">Notes</label>

                        <textarea class="form-control" th:field="*{notes}">
                    </textarea>

                    </div>

                    <button type="submit" class="btn btn-success">

                        Update

                    </button>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
