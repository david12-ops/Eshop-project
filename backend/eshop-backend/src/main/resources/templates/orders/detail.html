<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Order Detail</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-3">

            <h1>Order Detail</h1>

            <div class="d-flex gap-2">

                <a th:href="@{/orders}" class="btn btn-secondary">

                    Back

                </a>

            </div>

        </div>

        <!-- ORDER INFORMATION -->
        <div class="card mb-4">

            <div class="card-header">

                Order Information

            </div>

            <div class="card-body">

                <div class="row mb-2">

                    <div class="col-md-3 fw-bold">
                        Order ID
                    </div>

                    <div class="col-md-9" th:text="${order.orderId}">
                    </div>

                </div>

                <div class="row mb-2">

                    <div class="col-md-3 fw-bold">
                        Customer
                    </div>

                    <div class="col-md-9" th:text="${order.customer.firstName + ' ' + order.customer.lastName}">
                    </div>

                </div>

                <div class="row mb-2">

                    <div class="col-md-3 fw-bold">
                        Status
                    </div>

                    <div class="col-md-9">

                        <span class="badge bg-info"
                            th:text="${order.status != null ? order.status.statusName : 'No Status'}">
                        </span>

                    </div>

                </div>

                <div class="row mb-2">

                    <div class="col-md-3 fw-bold">
                        Currency
                    </div>

                    <div class="col-md-9" th:text="${order.currency.currencyCode}">
                    </div>

                </div>

                <div class="row mb-2">

                    <div class="col-md-3 fw-bold">
                        Delivery Address
                    </div>

                    <div class="col-md-9"
                        th:text="${order.deliveryAddress.streetName + ', ' + order.deliveryAddress.cityName}">
                    </div>

                </div>

                <div class="row mb-2">

                    <div class="col-md-3 fw-bold">
                        Subtotal
                    </div>

                    <div class="col-md-9" th:text="${order.subtotal}">
                    </div>

                </div>

                <div class="row mb-2">

                    <div class="col-md-3 fw-bold">
                        Tax Amount
                    </div>

                    <div class="col-md-9" th:text="${order.taxAmount}">
                    </div>

                </div>

                <div class="row mb-2">

                    <div class="col-md-3 fw-bold">
                        Total Amount
                    </div>

                    <div class="col-md-9 fw-bold text-success" th:text="${order.totalAmount}">
                    </div>

                </div>

                <div class="row mb-2">

                    <div class="col-md-3 fw-bold">
                        Notes
                    </div>

                    <div class="col-md-9" th:text="${order.notes}">
                    </div>

                </div>

                <div class="row mb-2">

                    <div class="col-md-3 fw-bold">
                        Order Date
                    </div>

                    <div class="col-md-9" th:text="${order.orderDate}">
                    </div>

                </div>

                <div class="row mb-2">

                    <div class="col-md-3 fw-bold">
                        Created At
                    </div>

                    <div class="col-md-9" th:text="${order.createdAt}">
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-3 fw-bold">
                        Updated At
                    </div>

                    <div class="col-md-9" th:text="${order.updatedAt}">
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-3 fw-bold">
                        Deleted At
                    </div>

                    <div class="col-md-9" th:text="${order.deletedAt != null ? order.deletedAt : '-'}">
                    </div>

                </div>

            </div>

        </div>

        <!-- DISCOUNTS -->
        <div class="card mb-4">

            <div class="card-header">

                Discounts

            </div>

            <div class="card-body">

                <div th:if="${#sets.isEmpty(order.discounts)}" class="text-muted">

                    No discounts applied

                </div>

                <table th:if="${!#sets.isEmpty(order.discounts)}" class="table table-bordered table-striped mb-0">

                    <thead>

                        <tr>

                            <th>Name</th>
                            <th>Code</th>
                            <th>Type</th>
                            <th>Value</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr th:each="discount : ${order.discounts}">

                            <td th:text="${discount.discountName}"></td>

                            <td th:text="${discount.discountCode}"></td>

                            <td th:text="${discount.discountType}"></td>

                            <td th:text="${discount.discountValue}"></td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

        <!-- ORDER ITEMS -->
        <div class="card">

            <div class="card-header d-flex justify-content-between align-items-center">

                <span>
                    Order Items
                </span>

                <a th:href="@{/order-items/create/{id}(id=${order.orderId})}" class="btn btn-primary btn-sm">

                    Add Item

                </a>

            </div>

            <div class="card-body p-0">

                <table class="table table-bordered table-striped mb-0">

                    <thead>

                        <tr>

                            <th>Order Item ID</th>
                            <th>Notes</th>
                            <th>Actions</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr th:each="item : ${order.orderItems}">

                            <td th:text="${item.orderItemId}"></td>

                            <td th:text="${item.notes}"></td>

                            <td>

                                <a th:href="@{/order-items/detail/{id}(id=${item.orderItemId})}"
                                    class="btn btn-info btn-sm">

                                    Detail

                                </a>

                                <a th:href="@{/order-items/edit/{id}(id=${item.orderItemId})}"
                                    class="btn btn-warning btn-sm">

                                    Edit

                                </a>

                                <form th:action="@{/order-items/delete/{id}(id=${item.orderItemId})}" method="post"
                                    style="display:inline-block">

                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                                    <button type="submit" class="btn btn-danger btn-sm">

                                        Delete

                                    </button>

                                </form>

                            </td>

                        </tr>

                        <tr th:if="${#lists.isEmpty(order.orderItems)}">

                            <td colspan="4" class="text-center text-muted py-4">

                                No items found

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</body>

</html>
