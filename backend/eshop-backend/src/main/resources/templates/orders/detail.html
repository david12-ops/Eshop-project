<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Order Detail</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <h1>Order Detail</h1>

        <table class="table table-bordered">

            <tr>
                <th>ID</th>
                <td th:text="${order.id}"></td>
            </tr>

            <tr>
                <th>Customer</th>
                <td th:text="${order.customer != null ? order.customer.customerId : '-'}"></td>
            </tr>

            <tr>
                <th>Order Date</th>
                <td th:text="${order.orderDate}"></td>
            </tr>

            <tr>
                <th>Status</th>
                <td th:text="${order.status != null ? order.status.statusName : '-'}"></td>
            </tr>

            <tr>
                <th>Currency Code</th>
                <td th:text="${order.currencyCode}"></td>
            </tr>

            <tr>
                <th>Subtotal</th>
                <td th:text="${order.subtotal}"></td>
            </tr>

            <tr>
                <th>Tax Amount</th>
                <td th:text="${order.taxAmount}"></td>
            </tr>

            <tr>
                <th>Total Amount</th>
                <td th:text="${order.totalAmount}"></td>
            </tr>

            <tr>
                <th>Delivery Address</th>
                <td th:text="${order.deliveryAddress != null ? order.deliveryAddress.streetName : '-'}"></td>
            </tr>

            <tr>
                <th>Notes</th>
                <td th:text="${order.notes}"></td>
            </tr>

            <tr>
                <th>Created At</th>
                <td th:text="${order.createdAt}"></td>
            </tr>

            <tr>
                <th>Updated At</th>
                <td th:text="${order.updatedAt}"></td>
            </tr>

        </table>

        <a th:href="@{/orders}" class="btn btn-secondary">
            Back
        </a>

    </div>

</body>

</html>
