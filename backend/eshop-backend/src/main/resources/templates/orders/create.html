<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Create Order</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <h1>Create Order</h1>

        <form th:action="@{/orders/create}" th:object="${order}" method="post">

            <div class="mb-3">

                <label class="form-label">Customer</label>

                <select class="form-select" th:field="*{customer}">

                    <option th:each="customer : ${customers}" th:value="${customer.id}"
                        th:text="${customer.customerId}">
                    </option>

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">Order Date</label>

                <input type="date" class="form-control" th:field="*{orderDate}">

            </div>

            <div class="mb-3">

                <label class="form-label">Status</label>

                <select class="form-select" th:field="*{status}">

                    <option th:each="status : ${statuses}" th:value="${status.id}" th:text="${status.statusName}">
                    </option>

                </select>

            </div>

            <div class="row">

                <div class="col-md-4 mb-3">

                    <label class="form-label">Currency Code</label>

                    <input type="text" maxlength="3" class="form-control" th:field="*{currencyCode}">

                </div>

                <div class="col-md-4 mb-3">

                    <label class="form-label">Subtotal</label>

                    <input type="number" step="0.01" class="form-control" th:field="*{subtotal}">

                </div>

                <div class="col-md-4 mb-3">

                    <label class="form-label">Tax Amount</label>

                    <input type="number" step="0.01" class="form-control" th:field="*{taxAmount}">

                </div>

            </div>

            <div class="mb-3">

                <label class="form-label">Total Amount</label>

                <input type="number" step="0.01" class="form-control" th:field="*{totalAmount}">

            </div>

            <div class="mb-3">

                <label class="form-label">Delivery Address</label>

                <select class="form-select" th:field="*{deliveryAddress}">

                    <option th:each="address : ${addresses}" th:value="${address.id}"
                        th:text="${address.streetName + ', ' + address.cityName}">
                    </option>

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">Notes</label>

                <textarea class="form-control" rows="5" th:field="*{notes}">
            </textarea>

            </div>

            <button type="submit" class="btn btn-success">
                Save
            </button>

            <a th:href="@{/orders}" class="btn btn-secondary">
                Back
            </a>

        </form>

    </div>

</body>

</html>
