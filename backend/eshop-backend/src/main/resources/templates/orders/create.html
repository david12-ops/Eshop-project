<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Create Order</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h2>Create Order</h2>

                    <a th:href="@{/orders}" class="btn btn-secondary">

                        Back

                    </a>

                </div>

                <form th:action="@{/orders/create}" th:object="${order}" method="post">

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <!-- ORDER DATE -->
                    <div class="mb-3">

                        <label class="form-label">
                            Order Date
                        </label>

                        <input type="date" th:field="*{orderDate}" class="form-control" required>

                    </div>

                    <!-- CUSTOMER -->
                    <div class="mb-3">

                        <label class="form-label">
                            Customer
                        </label>

                        <select th:field="*{customer}" class="form-select">

                            <option th:each="customer : ${customers}" th:value="${customer.id}"
                                th:text="${customer.firstName + ' ' + customer.lastName}">
                            </option>

                        </select>

                    </div>

                    <!-- STATUS -->
                    <div class="mb-3">

                        <label class="form-label">
                            Status
                        </label>

                        <select th:field="*{status}" class="form-select">

                            <option value="">
                                -- No Status --
                            </option>

                            <option th:each="status : ${statuses}" th:value="${status.id}"
                                th:text="${status.statusName}">
                            </option>

                        </select>

                    </div>

                    <!-- CURRENCY -->
                    <div class="mb-3">

                        <label class="form-label">
                            Currency
                        </label>

                        <select th:field="*{currency}" class="form-select">

                            <option th:each="currency : ${currencies}" th:value="${currency.currencyCode}"
                                th:text="${currency.currencyCode}">
                            </option>

                        </select>

                    </div>

                    <!-- ADDRESS -->
                    <div class="mb-3">

                        <label class="form-label">
                            Delivery Address
                        </label>

                        <select th:field="*{deliveryAddress}" class="form-select">

                            <option th:each="address : ${addresses}" th:value="${address.id}"
                                th:text="${address.streetName + ', ' + address.cityName}">
                            </option>

                        </select>

                    </div>

                    <!-- PRICES -->
                    <div class="row">

                        <div class="col-md-4 mb-3">

                            <label class="form-label">
                                Subtotal
                            </label>

                            <input type="number" step="0.01" th:field="*{subtotal}" class="form-control">

                        </div>

                        <div class="col-md-4 mb-3">

                            <label class="form-label">
                                Tax Amount
                            </label>

                            <input type="number" step="0.01" th:field="*{taxAmount}" class="form-control">

                        </div>

                        <div class="col-md-4 mb-3">

                            <label class="form-label">
                                Total Amount
                            </label>

                            <input type="number" step="0.01" th:field="*{totalAmount}" class="form-control">

                        </div>

                    </div>

                    <!-- NOTES -->
                    <div class="mb-4">

                        <label class="form-label">
                            Notes
                        </label>

                        <textarea th:field="*{notes}" class="form-control" rows="4"></textarea>

                    </div>

                    <button type="submit" class="btn btn-success">

                        Create Order

                    </button>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
