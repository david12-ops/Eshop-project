<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Invoice Detail</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <h1>Invoice Detail</h1>

        <table class="table table-bordered">

            <tr>
                <th>ID</th>
                <td th:text="${invoice.id}"></td>
            </tr>

            <tr>
                <th>Invoice Code</th>
                <td th:text="${invoice.invoiceCode}"></td>
            </tr>

            <tr>
                <th>Order</th>
                <td th:text="${invoice.order != null ? invoice.order.id : '-'}"></td>
            </tr>

            <tr>
                <th>Issue Date</th>
                <td th:text="${invoice.issueDate}"></td>
            </tr>

            <tr>
                <th>Due Date</th>
                <td th:text="${invoice.dueDate}"></td>
            </tr>

            <tr>
                <th>Payment Date</th>
                <td th:text="${invoice.paymentDate}"></td>
            </tr>

            <tr>
                <th>Payment Method</th>
                <td th:text="${invoice.paymentMethod != null ? invoice.paymentMethod.methodName : '-'}"></td>
            </tr>

            <tr>
                <th>Billing Address</th>
                <td th:text="${invoice.billingAddress != null ? invoice.billingAddress.streetName : '-'}"></td>
            </tr>

            <tr>
                <th>Currency</th>
                <td th:text="${invoice.currencyCode}"></td>
            </tr>

            <tr>
                <th>Subtotal</th>
                <td th:text="${invoice.subtotal}"></td>
            </tr>

            <tr>
                <th>Tax Amount</th>
                <td th:text="${invoice.taxAmount}"></td>
            </tr>

            <tr>
                <th>Total Amount</th>
                <td th:text="${invoice.totalAmount}"></td>
            </tr>

            <tr>
                <th>Notes</th>
                <td th:text="${invoice.notes}"></td>
            </tr>

            <tr>
                <th>Created At</th>
                <td th:text="${invoice.createdAt}"></td>
            </tr>

            <tr>
                <th>Updated At</th>
                <td th:text="${invoice.updatedAt}"></td>
            </tr>

        </table>

        <a th:href="@{/invoices}" class="btn btn-secondary">
            Back
        </a>

    </div>

</body>

</html>
