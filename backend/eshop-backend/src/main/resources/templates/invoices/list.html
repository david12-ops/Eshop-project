<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Invoices</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h1>Invoices</h1>

            <a th:href="@{/invoices/create}" class="btn btn-primary">
                Create Invoice
            </a>

        </div>

        <table class="table table-bordered table-striped">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Invoice Code</th>
                    <th>Order</th>
                    <th>Issue Date</th>
                    <th>Due Date</th>
                    <th>Total Amount</th>
                    <th>Currency</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="invoice : ${invoices}">

                    <td th:text="${invoice.id}"></td>

                    <td th:text="${invoice.invoiceCode}"></td>

                    <td th:text="${invoice.order != null ? invoice.order.id : '-'}"></td>

                    <td th:text="${invoice.issueDate}"></td>

                    <td th:text="${invoice.dueDate}"></td>

                    <td th:text="${invoice.totalAmount}"></td>

                    <td th:text="${invoice.currencyCode}"></td>

                    <td>

                        <a th:href="@{/invoices/detail/{id}(id=${invoice.id})}" class="btn btn-info btn-sm">
                            Detail
                        </a>

                        <a th:href="@{/invoices/edit/{id}(id=${invoice.id})}" class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <form th:action="@{/invoices/delete/{id}(id=${invoice.id})}" method="post"
                            style="display:inline-block">

                            <button type="submit" class="btn btn-danger btn-sm">
                                Delete
                            </button>

                        </form>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</body>

</html>
