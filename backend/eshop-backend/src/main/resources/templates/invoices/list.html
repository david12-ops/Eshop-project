<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Invoices</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h1>Invoices</h1>

            <div class="d-flex gap-2">

                <a th:href="@{/}" class="btn btn-secondary">

                    Home

                </a>
            </div>

        </div>

        <table class="table table-bordered table-striped">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Invoice Code</th>
                    <th>Order</th>
                    <th>Payment Method</th>
                    <th>Currency</th>
                    <th>Issue Date</th>
                    <th>Due Date</th>
                    <th>Total</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

                <tr th:each="invoice : ${invoices}">

                    <td th:text="${invoice.invoiceId}"></td>

                    <td th:text="${invoice.invoiceCode}"></td>

                    <td th:text="${invoice.order != null ? invoice.order.orderId : '-'}"></td>

                    <td th:text="${invoice.paymentMethod != null ? invoice.paymentMethod.methodName : '-'}">
                    </td>

                    <td>

                        <span th:text="${invoice.currency.currencyCode}"></span>
                        -
                        <span th:text="${invoice.currency.symbol}"></span>

                    </td>

                    <td th:text="${invoice.issueDate}"></td>

                    <td th:text="${invoice.dueDate}"></td>

                    <td class="fw-bold text-success">

                        <span th:text="${invoice.totalAmount}"></span>

                    </td>

                    <td>

                        <a th:href="@{/invoices/detail/{id}(id=${invoice.invoiceId})}" class="btn btn-info btn-sm">

                            Detail

                        </a>

                        <a th:href="@{/invoices/edit/{id}(id=${invoice.invoiceId})}" class="btn btn-warning btn-sm">

                            Edit

                        </a>

                        <form th:action="@{/invoices/delete/{id}(id=${invoice.invoiceId})}" method="post"
                            style="display:inline-block">

                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                            <button type="submit" class="btn btn-danger btn-sm">

                                Delete

                            </button>

                        </form>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</body>

</html>
