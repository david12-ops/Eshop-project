<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Edit Invoice</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <h1>Edit Invoice</h1>

        <form th:action="@{/invoices/edit/{id}(id=${invoice.id})}" th:object="${invoice}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="mb-3">

                <label class="form-label">Invoice Code</label>

                <input type="text" class="form-control" th:field="*{invoiceCode}">

            </div>

            <div class="mb-3">

                <label class="form-label">Order</label>

                <select class="form-select" th:field="*{order}">

                    <option th:each="order : ${orders}" th:value="${order.id}" th:text="${order.id}">
                    </option>

                </select>

            </div>

            <div class="row">

                <div class="col-md-4 mb-3">

                    <label class="form-label">Issue Date</label>

                    <input type="date" class="form-control" th:field="*{issueDate}">

                </div>

                <div class="col-md-4 mb-3">

                    <label class="form-label">Due Date</label>

                    <input type="date" class="form-control" th:field="*{dueDate}">

                </div>

                <div class="col-md-4 mb-3">

                    <label class="form-label">Payment Date</label>

                    <input type="date" class="form-control" th:field="*{paymentDate}">

                </div>

            </div>

            <div class="mb-3">

                <label class="form-label">Payment Method</label>

                <select class="form-select" th:field="*{paymentMethod}">

                    <option th:each="method : ${paymentMethods}" th:value="${method.id}" th:text="${method.methodName}">
                    </option>

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">Billing Address</label>

                <select class="form-select" th:field="*{billingAddress}">

                    <option th:each="address : ${addresses}" th:value="${address.id}"
                        th:text="${address.streetName + ', ' + address.cityName}">
                    </option>

                </select>

            </div>

            <div class="row">

                <div class="col-md-3 mb-3">

                    <label class="form-label">Currency</label>

                    <input type="text" maxlength="3" class="form-control" th:field="*{currencyCode}">

                </div>

                <div class="col-md-3 mb-3">

                    <label class="form-label">Subtotal</label>

                    <input type="number" step="0.01" class="form-control" th:field="*{subtotal}">

                </div>

                <div class="col-md-3 mb-3">

                    <label class="form-label">Tax Amount</label>

                    <input type="number" step="0.01" class="form-control" th:field="*{taxAmount}">

                </div>

                <div class="col-md-3 mb-3">

                    <label class="form-label">Total Amount</label>

                    <input type="number" step="0.01" class="form-control" th:field="*{totalAmount}">

                </div>

            </div>

            <div class="mb-3">

                <label class="form-label">Notes</label>

                <textarea class="form-control" rows="5" th:field="*{notes}">
            </textarea>

            </div>

            <button type="submit" class="btn btn-success">
                Update
            </button>

            <a th:href="@{/invoices}" class="btn btn-secondary">
                Back
            </a>

        </form>

    </div>

</body>

</html>
