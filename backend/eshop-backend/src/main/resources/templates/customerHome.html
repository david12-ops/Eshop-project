<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>E-Shop</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

        <div class="container">

            <a class="navbar-brand fw-bold" th:href="@{/}">
                My E-Shop
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <!-- SEARCH -->
                <form class="d-flex mx-auto w-50" th:action="@{/products/search}" method="get">

                    <input class="form-control me-2" type="search" name="keyword" placeholder="Search products...">

                    <button class="btn btn-outline-light" type="submit">
                        Search
                    </button>

                </form>

                <!-- RIGHT MENU -->
                <div class="d-flex align-items-center gap-2">

                    <!-- FAVORITES -->
                    <a th:href="@{/favorites}" class="btn btn-outline-light position-relative">

                        <i class="bi bi-heart"></i>

                        Favorites

                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                            th:text="${favoriteCount}">
                            0
                        </span>

                    </a>

                    <!-- CART -->
                    <a th:href="@{/cart}" class="btn btn-warning position-relative">

                        <i class="bi bi-cart"></i>

                        Cart

                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                            th:text="${cartItemCount}">
                            0
                        </span>

                    </a>

                    <!-- LOGIN -->
                    <a sec:authorize="isAnonymous()" th:href="@{/login}" class="btn btn-outline-info">

                        Login

                    </a>

                    <!-- REGISTER -->
                    <a sec:authorize="isAnonymous()" th:href="@{/register}" class="btn btn-success">

                        Register

                    </a>

                    <!-- USER MENU -->
                    <div sec:authorize="isAuthenticated()" class="dropdown">

                        <button class="btn btn-outline-light dropdown-toggle" data-bs-toggle="dropdown">

                            <i class="bi bi-person-circle"></i>

                            Account

                        </button>

                        <ul class="dropdown-menu dropdown-menu-end">

                            <li>
                                <a class="dropdown-item" th:href="@{/profile}">

                                    Profile

                                </a>
                            </li>

                            <li>
                                <a class="dropdown-item" th:href="@{/orders}">

                                    Orders

                                </a>
                            </li>

                            <li>
                                <hr class="dropdown-divider">
                            </li>

                            <li>

                                <form th:action="@{/logout}" method="post">

                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                                    <button type="submit" class="dropdown-item text-danger">

                                        Logout

                                    </button>

                                </form>

                            </li>

                        </ul>

                    </div>

                </div>

            </div>

        </div>

    </nav>

    <!-- HERO SECTION -->
    <section class="bg-primary text-white py-5 shadow-sm">

        <div class="container text-center">

            <h1 class="display-4 fw-bold mb-3">
                Welcome to My E-Shop
            </h1>

            <p class="lead mb-4">
                Discover the best products at the best prices.
            </p>

            <a th:href="@{/products}" class="btn btn-light btn-lg px-4">

                Browse Products

            </a>

        </div>

    </section>

    <!-- PRODUCT SECTION -->
    <div class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2 class="fw-bold">
                Featured Products
            </h2>

        </div>

        <div class="row g-4">

            <!-- PRODUCT CARD -->
            <div class="col-md-6 col-lg-4 col-xl-3" th:each="product : ${products}">

                <div class="card h-100 shadow-sm border-0">

                    <!-- IMAGE -->
                    <img th:src="${product.imageUrl}" class="card-img-top" alt="Product Image"
                        style="height: 250px; object-fit: cover;">

                    <div class="card-body d-flex flex-column">

                        <!-- NAME -->
                        <h5 class="card-title fw-bold" th:text="${product.productName}">

                            Product Name

                        </h5>

                        <!-- CATEGORY -->
                        <p class="text-muted mb-2" th:text="${product.category.categoryName}">

                            Category

                        </p>

                        <!-- DESCRIPTION -->
                        <p class="card-text small text-muted flex-grow-1" th:text="${product.shortDescription}">

                            Product Description

                        </p>

                        <!-- PRICE -->
                        <div class="mb-3">

                            <span class="fs-4 fw-bold text-success" th:text="${product.price}">

                                0.00

                            </span>

                            <span class="text-muted" th:text="${product.currency.symbol}">

                                $

                            </span>

                        </div>

                        <!-- BUTTONS -->
                        <div class="d-grid gap-2">

                            <!-- DETAIL -->
                            <a th:href="@{/products/detail/{id}(id=${product.productId})}"
                                class="btn btn-outline-primary">

                                Detail

                            </a>

                            <!-- ADD TO CART -->
                            <form th:action="@{/cart/add/{id}(id=${product.productId})}" method="post">

                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                                <button type="submit" class="btn btn-warning w-100">

                                    <i class="bi bi-cart-plus"></i>

                                    Add to Cart

                                </button>

                            </form>

                            <!-- ADD TO FAVORITES -->
                            <form th:action="@{/favorites/add/{id}(id=${product.productId})}" method="post">

                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                                <button type="submit" class="btn btn-outline-danger w-100">

                                    <i class="bi bi-heart"></i>

                                    Add to Favorites

                                </button>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- FOOTER -->
    <footer class="bg-dark text-light py-4 mt-5">

        <div class="container text-center">

            <p class="mb-1">
                © 2026 My E-Shop
            </p>

            <small class="text-secondary">
                Built with Spring Boot, Thymeleaf and Bootstrap
            </small>

        </div>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
