<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <title>Cart</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

    <div class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h1 class="fw-bold">

                <i class="bi bi-cart"></i>

                Shopping Cart

            </h1>

            <a th:href="@{/}" class="btn btn-secondary">

                Continue Shopping

            </a>

        </div>

        <!-- EMPTY -->
        <div th:if="${#lists.isEmpty(cart)}" class="alert alert-info">

            Cart is empty

        </div>

        <!-- ITEMS -->
        <div th:if="${!#lists.isEmpty(cart)}">

            <div class="card shadow-sm border-0">

                <div class="card-body p-0">

                    <table class="table table-hover mb-0">

                        <thead class="table-dark">

                            <tr>

                                <th>Image</th>
                                <th>Name</th>
                                <th>Price</th>
                                <th>Action</th>

                            </tr>

                        </thead>

                        <tbody>

                            <tr th:each="product, stat : ${cart}">

                                <td width="120">

                                    <img th:src="${product.productImageUrl}" class="img-fluid rounded"
                                        style="height:80px;object-fit:cover;">

                                </td>

                                <td class="align-middle fw-semibold" th:text="${product.productName}">
                                </td>

                                <td class="align-middle text-success fw-bold" th:text="${product.unitPrice}">
                                </td>

                                <td class="align-middle">

                                    <form th:action="@{/cart/remove/{index}(index=${stat.index})}" method="post">

                                        <input type="hidden" th:name="${_csrf.parameterName}"
                                            th:value="${_csrf.token}" />

                                        <button type="submit" class="btn btn-danger btn-sm">

                                            Remove

                                        </button>

                                    </form>

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

            <!-- ACTIONS -->
            <div class="d-flex justify-content-between mt-4">

                <form th:action="@{/cart/clear}" method="post">

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <button type="submit" class="btn btn-outline-danger">

                        Clear Cart

                    </button>

                </form>

                <button class="btn btn-success btn-lg">

                    Checkout

                </button>

            </div>

        </div>

    </div>

</body>

</html>
