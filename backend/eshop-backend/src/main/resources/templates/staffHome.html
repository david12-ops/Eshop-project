<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <title>Staff Home</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container-fluid">

            <a class="navbar-brand" th:href="@{/staffHome}">

                E-Shop Staff

            </a>

            <form th:action="@{/logout}" method="post" class="d-flex ms-auto">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <button type="submit" class="btn btn-outline-light">

                    Logout

                </button>

            </form>

        </div>

    </nav>

    <div class="container mt-5">

        <div class="p-5 bg-light rounded-3 border">

            <h1 class="display-5">

                Welcome to Staff Panel

            </h1>

            <p class="lead">

                Spring Boot + Thymeleaf + PostgreSQL

            </p>

            <hr>

            <div class="mt-4 d-flex flex-wrap gap-3">

                <a th:href="@{/products}" class="btn btn-primary">

                    Manage Products

                </a>

                <a th:href="@{/categories}" class="btn btn-success">

                    Manage Categories

                </a>

                <a th:href="@{/currencies}" class="btn btn-warning">

                    Manage Currencies

                </a>

                <a th:href="@{/customers}" class="btn btn-info">

                    Manage Customers

                </a>

                <a th:href="@{/discounts}" class="btn btn-danger">

                    Manage Discounts

                </a>

                <a th:href="@{/orderStatuses}" class="btn btn-dark">

                    Manage Order Statuses

                </a>

                <a th:href="@{/paymentMethods}" class="btn btn-secondary">

                    Manage Payment Methods

                </a>

                <!-- PURPLE -->
                <a th:href="@{/regions}" class="btn text-white" style="background-color:#6f42c1; border-color:#6f42c1;">

                    Manage Regions

                </a>

                <!-- ORANGE -->
                <a th:href="@{/addresses}" class="btn text-white"
                    style="background-color:#fd7e14; border-color:#fd7e14;">

                    Manage Addresses

                </a>

                <!-- TEAL -->
                <a th:href="@{/orders}" class="btn text-white" style="background-color:#20c997; border-color:#20c997;">

                    Manage Orders

                </a>

                <!-- PINK -->
                <a th:href="@{/invoices}" class="btn text-white"
                    style="background-color:#d63384; border-color:#d63384;">

                    Manage Invoices

                </a>

            </div>

        </div>

    </div>

</body>

</html>
