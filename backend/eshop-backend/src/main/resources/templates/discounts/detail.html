<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Discount Detail</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h2>Discount Detail</h2>

                    <a th:href="@{/discounts}" class="btn btn-secondary">

                        Back

                    </a>

                </div>

                <table class="table table-bordered">

                    <tr>
                        <th>ID</th>
                        <td th:text="${discount.discountId}"></td>
                    </tr>

                    <tr>
                        <th>Name</th>
                        <td th:text="${discount.discountName}"></td>
                    </tr>

                    <tr>
                        <th>Code</th>
                        <td th:text="${discount.discountCode}"></td>
                    </tr>

                    <tr>
                        <th>Type</th>
                        <td th:text="${discount.discountType}"></td>
                    </tr>

                    <tr>
                        <th>Value</th>
                        <td th:text="${discount.discountValue}"></td>
                    </tr>

                    <tr>
                        <th>Description</th>
                        <td th:text="${discount.discountDescription}"></td>
                    </tr>

                    <tr>
                        <th>Valid From</th>
                        <td th:text="${discount.validFrom}"></td>
                    </tr>

                    <tr>
                        <th>Valid To</th>
                        <td th:text="${discount.validTo}"></td>
                    </tr>

                    <tr>
                        <th>Created At</th>
                        <td th:text="${discount.createdAt}"></td>
                    </tr>

                    <tr>
                        <th>Updated At</th>
                        <td th:text="${discount.updatedAt}"></td>
                    </tr>

                    <tr>
                        <th>Deleted At</th>
                        <td th:text="${discount.deletedAt != null ? discount.deletedAt : '-'}"></td>
                    </tr>

                </table>

            </div>

        </div>

    </div>

</body>

</html>
