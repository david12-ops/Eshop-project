<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Create Discount</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h2>Create Discount</h2>

                    <a th:href="@{/discounts}" class="btn btn-secondary">

                        Back

                    </a>

                </div>

                <form th:action="@{/discounts/create}" th:object="${discount}" method="post">

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="mb-3">

                        <label class="form-label">
                            Discount Name
                        </label>

                        <input type="text" th:field="*{discountName}" class="form-control" required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Discount Code
                        </label>

                        <input type="text" th:field="*{discountCode}" class="form-control" required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Discount Type
                        </label>

                        <select th:field="*{discountType}" class="form-select">

                            <option th:each="type : ${discountTypes}" th:value="${type}" th:text="${type}">
                            </option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Discount Value
                        </label>

                        <input type="number" step="0.01" th:field="*{discountValue}" class="form-control" required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Description
                        </label>

                        <textarea th:field="*{discountDescription}" class="form-control" rows="4"></textarea>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Valid From
                            </label>

                            <input type="date" th:field="*{validFrom}" class="form-control">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Valid To
                            </label>

                            <input type="date" th:field="*{validTo}" class="form-control">

                        </div>

                    </div>

                    <button type="submit" class="btn btn-success">

                        Create Discount

                    </button>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
