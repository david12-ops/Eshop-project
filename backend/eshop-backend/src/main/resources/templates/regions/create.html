<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Create Region</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h2>Create Region</h2>

                    <a th:href="@{/regions}" class="btn btn-secondary">

                        Back

                    </a>

                </div>

                <form th:action="@{/regions/create}" th:object="${region}" method="post">

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="mb-3">

                        <label class="form-label">
                            Region Name
                        </label>

                        <input type="text" th:field="*{regionName}" class="form-control" required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Currency
                        </label>

                        <div class="input-group">

                            <span class="input-group-text" th:text="*{region.symbol}">
                                Kč
                            </span>

                            <input type="text" th:field="*{currency}" class="form-control" readonly />

                        </div>

                    </div>

                    <button type="submit" class="btn btn-success">

                        Create Region

                    </button>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
