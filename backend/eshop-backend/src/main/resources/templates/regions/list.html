<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Regions</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">

            <div class="d-flex gap-2">

                <a href="javascript:history.back()" class="btn btn-secondary">

                    Back

                </a>

                <a th:href="@{/regions/create}" class="btn btn-primary">

                    Create Region

                </a>

            </div>

            <h1 class="mb-0">
                Regions
            </h1>

        </div>

        <!-- TABLE -->
        <table class="table table-bordered table-striped table-hover align-middle">

            <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>Region Name</th>
                    <th>Currency</th>
                    <th>Symbol</th>
                    <th>Created At</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

                <tr th:each="region : ${regions}">

                    <td th:text="${region.regionId}"></td>

                    <td th:text="${region.regionName}"></td>

                    <td th:text="${region.currency.currencyCode}"></td>

                    <td th:text="${region.currency.symbol}"></td>

                    <td th:text="${region.createdAt}"></td>

                    <td>

                        <div class="d-flex gap-1">

                            <a th:href="@{/regions/detail/{id}(id=${region.regionId})}" class="btn btn-info btn-sm">

                                Detail

                            </a>

                            <a th:href="@{/regions/edit/{id}(id=${region.regionId})}" class="btn btn-warning btn-sm">

                                Edit

                            </a>

                            <form th:action="@{/regions/delete/{id}(id=${region.regionId})}" method="post">

                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                                <button type="submit" class="btn btn-danger btn-sm">

                                    Delete

                                </button>

                            </form>

                        </div>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</body>

</html>
