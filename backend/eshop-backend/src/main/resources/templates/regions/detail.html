<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Region Detail</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h2>Region Detail</h2>

                    <a th:href="@{/regions}" class="btn btn-secondary">

                        Back

                    </a>

                </div>

                <table class="table table-bordered">

                    <tr>
                        <th>ID</th>
                        <td th:text="${region.regionId}"></td>
                    </tr>

                    <tr>
                        <th>Region Name</th>
                        <td th:text="${region.regionName}"></td>
                    </tr>

                    <tr>
                        <th>Currency Code</th>
                        <td th:text="${region.currency.currencyCode}"></td>
                    </tr>

                    <tr>
                        <th>Currency Name</th>
                        <td th:text="${region.currency.currencyName}"></td>
                    </tr>

                    <tr>
                        <th>Currency Symbol</th>
                        <td th:text="${region.currency.symbol}"></td>
                    </tr>

                    <tr>
                        <th>Created At</th>
                        <td th:text="${region.createdAt}"></td>
                    </tr>

                    <tr>
                        <th>Updated At</th>
                        <td th:text="${region.updatedAt}"></td>
                    </tr>

                </table>

            </div>

        </div>

    </div>

</body>

</html>
