<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Permissions</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">

            <div class="d-flex gap-2">

                <a href="javascript:history.back()" class="btn btn-secondary">

                    Back

                </a>

                <a th:href="@{/permissions/create}" class="btn btn-primary">

                    Create Permission

                </a>

            </div>

            <h1 class="mb-0">
                Permissions
            </h1>

        </div>

        <!-- TABLE -->
        <table class="table table-bordered table-striped table-hover align-middle">

            <thead class="table-dark">

                <tr>

                    <th>Role</th>
                    <th>Resource</th>
                    <th>Operation</th>
                    <th>Created At</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

                <tr th:each="permission : ${permissions}">

                    <td th:text="${permission.role.roleName}"></td>

                    <td>

                        <span class="badge bg-info text-dark" th:text="${permission.resourceType}">
                        </span>

                    </td>

                    <td>

                        <span class="badge bg-success" th:text="${permission.operationType}">
                        </span>

                    </td>

                    <td th:text="${permission.createdAt}"></td>

                    <td>

                        <div class="d-flex gap-1">

                            <a th:href="@{/permissions/detail/{roleId}/{resourceType}/{operationType}
                    (
                        roleId=${permission.role.id},
                        resourceType=${permission.resourceType},
                        operationType=${permission.operationType}
                    )}" class="btn btn-info btn-sm">

                                Detail

                            </a>

                            <a th:href="@{/permissions/edit/{roleId}/{resourceType}/{operationType}
                    (
                        roleId=${permission.role.id},
                        resourceType=${permission.resourceType},
                        operationType=${permission.operationType}
                    )}" class="btn btn-warning btn-sm">

                                Edit

                            </a>

                            <form th:action="@{/permissions/delete/{roleId}/{resourceType}/{operationType}
                    (
                        roleId=${permission.role.id},
                        resourceType=${permission.resourceType},
                        operationType=${permission.operationType}
                    )}" method="post">

                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                                <button type="submit" class="btn btn-danger btn-sm">

                                    Delete

                                </button>

                            </form>

                        </div>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</body>

</html>
