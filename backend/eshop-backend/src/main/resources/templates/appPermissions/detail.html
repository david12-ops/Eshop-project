<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Permission Detail</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h2>Permission Detail</h2>

                    <a th:href="@{/permissions}" class="btn btn-secondary">

                        Back

                    </a>

                </div>

                <table class="table table-bordered">

                    <tr>
                        <th>Role</th>
                        <td th:text="${permission.role.roleName}"></td>
                    </tr>

                    <tr>
                        <th>Resource Type</th>
                        <td th:text="${permission.resourceType}"></td>
                    </tr>

                    <tr>
                        <th>Operation Type</th>
                        <td th:text="${permission.operationType}"></td>
                    </tr>

                    <tr>
                        <th>Created At</th>
                        <td th:text="${permission.createdAt}"></td>
                    </tr>

                    <tr>
                        <th>Updated At</th>
                        <td th:text="${permission.updatedAt}"></td>
                    </tr>

                </table>

                <div class="d-flex gap-2">

                    <a th:href="@{/permissions/edit/{roleId}/{resourceType}/{operationType}
                (
                    roleId=${permission.role.id},
                    resourceType=${permission.resourceType},
                    operationType=${permission.operationType}
                )}" class="btn btn-warning">

                        Edit

                    </a>

                    <form th:action="@{/permissions/delete/{roleId}/{resourceType}/{operationType}
                (
                    roleId=${permission.role.id},
                    resourceType=${permission.resourceType},
                    operationType=${permission.operationType}
                )}" method="post">

                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <button type="submit" class="btn btn-danger">

                            Delete

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
