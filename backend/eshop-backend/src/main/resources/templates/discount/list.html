<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Discounts</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">

            <div class="d-flex gap-2">

                <a href="javascript:history.back()" class="btn btn-secondary">

                    Back

                </a>

                <a th:href="@{/discounts/create}" class="btn btn-primary">

                    Create Discount

                </a>

            </div>

            <h1 class="mb-0">
                Discounts
            </h1>

        </div>

        <!-- TABLE -->
        <table class="table table-bordered table-striped table-hover align-middle">

            <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>Name</th>
                    <th>Code</th>
                    <th>Type</th>
                    <th>Value</th>
                    <th>Valid From</th>
                    <th>Valid To</th>
                    <th>Created At</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

                <tr th:each="discount : ${discounts}">

                    <td th:text="${discount.discountId}"></td>

                    <td th:text="${discount.discountName}"></td>

                    <td th:text="${discount.discountCode}"></td>

                    <td th:text="${discount.discountType}"></td>

                    <td th:text="${discount.discountValue}"></td>

                    <td th:text="${discount.validFrom}"></td>

                    <td th:text="${discount.validTo}"></td>

                    <td th:text="${discount.createdAt}"></td>

                    <td>

                        <div class="d-flex gap-1">

                            <a th:href="@{/discounts/detail/{id}(id=${discount.discountId})}"
                                class="btn btn-info btn-sm">

                                Detail

                            </a>

                            <a th:href="@{/discounts/edit/{id}(id=${discount.discountId})}"
                                class="btn btn-warning btn-sm">

                                Edit

                            </a>

                            <form th:action="@{/discounts/delete/{id}(id=${discount.discountId})}" method="post">

                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                                <button type="submit" class="btn btn-danger btn-sm">

                                    Delete

                                </button>

                            </form>

                        </div>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</body>

</html>
