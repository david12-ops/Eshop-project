<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Register</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-5">

                <div class="card shadow">

                    <div class="card-body">

                        <h2 class="mb-4 text-center">
                            Create Account
                        </h2>

                        <!-- Error -->
                        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}">
                        </div>

                        <!-- Register Form -->
                        <form th:action="@{/register}" th:object="${user}" method="post">

                            <!-- CSRF -->
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                            <!-- Username -->
                            <div class="mb-3">

                                <label class="form-label">
                                    Username
                                </label>

                                <input type="text" th:field="*{username}" class="form-control" required maxlength="50">

                            </div>

                            <!-- Email -->
                            <div class="mb-3">

                                <label class="form-label">
                                    Email
                                </label>

                                <input type="email" th:field="*{email}" class="form-control" required maxlength="50">

                            </div>

                            <!-- Password -->
                            <div class="mb-3">

                                <label class="form-label">
                                    Password
                                </label>

                                <input type="password" th:field="*{password}" class="form-control" required>

                            </div>

                            <!-- Submit -->
                            <button type="submit" class="btn btn-success w-100">

                                Register

                            </button>

                        </form>

                        <!-- Login Link -->
                        <div class="text-center mt-3">

                            <a th:href="@{/login}">
                                Already have an account? Login
                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
