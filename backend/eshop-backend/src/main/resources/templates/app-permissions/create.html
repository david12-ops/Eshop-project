<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Create Permission</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h2>Create Permission</h2>

                    <a th:href="@{/app-permissions}" class="btn btn-secondary">

                        Back

                    </a>

                </div>

                <form th:action="@{/app-permissions/create}" th:object="${appPermission}" method="post">

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <!-- ROLE -->
                    <div class="mb-3">

                        <label class="form-label">
                            Role
                        </label>

                        <select th:field="*{role}" class="form-select" required>

                            <option th:each="role : ${roles}" th:value="${role.id}" th:text="${role.roleName}">
                            </option>

                        </select>

                    </div>

                    <!-- RESOURCE -->
                    <div class="mb-3">

                        <label class="form-label">
                            Resource Type
                        </label>

                        <select th:field="*{resourceType}" class="form-select" required>

                            <option th:each="resource : ${resourceTypes}" th:value="${resource}" th:text="${resource}">
                            </option>

                        </select>

                    </div>

                    <!-- OPERATION -->
                    <div class="mb-4">

                        <label class="form-label">
                            Operation Type
                        </label>

                        <select th:field="*{operationType}" class="form-select" required>

                            <option th:each="operation : ${operationTypes}" th:value="${operation}"
                                th:text="${operation}">
                            </option>

                        </select>

                    </div>

                    <button type="submit" class="btn btn-success">

                        Create Permission

                    </button>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
