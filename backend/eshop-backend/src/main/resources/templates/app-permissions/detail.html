<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Permission Detail</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h2>Permission Detail</h2>

                    <a th:href="@{/app-permissions}" class="btn btn-secondary">

                        Back

                    </a>

                </div>

                <table class="table table-bordered">

                    <tr>
                        <th>Role</th>
                        <td th:text="${appPermission.role.roleName}"></td>
                    </tr>

                    <tr>
                        <th>Resource Type</th>
                        <td th:text="${appPermission.resourceType}"></td>
                    </tr>

                    <tr>
                        <th>Operation Type</th>
                        <td th:text="${appPermission.operationType}"></td>
                    </tr>

                    <tr>
                        <th>Created At</th>
                        <td th:text="${appPermission.createdAt}"></td>
                    </tr>

                    <tr>
                        <th>Updated At</th>
                        <td th:text="${appPermission.updatedAt}"></td>
                    </tr>

                    <tr>
                        <th>Deleted At</th>
                        <td th:text="${appPermission.deletedAt != null ? appPermission.deletedAt : '-'}"></td>
                    </tr>

                </table>

            </div>

        </div>

    </div>

</body>

</html>
