<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Edit Permission</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h2>Edit Permission</h2>

                    <a th:href="@{/app-permissions}" class="btn btn-secondary">

                        Back

                    </a>

                </div>

                <!-- 
                Composite PK should ideally NOT be edited.
                Usually better to delete and recreate.
            -->

                <form th:action="@{/app-permissions/edit/{roleId}/{resourceType}/{operationType}
            (
                roleId=${appPermission.role.id},
                resourceType=${appPermission.resourceType},
                operationType=${appPermission.operationType}
            )}" th:object="${appPermission}" method="post">

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <!-- READ ONLY -->
                    <div class="mb-3">

                        <label class="form-label">
                            Role
                        </label>

                        <input type="text" th:value="${appPermission.role.roleName}" class="form-control" readonly>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Resource Type
                        </label>

                        <input type="text" th:value="${appPermission.resourceType}" class="form-control" readonly>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Operation Type
                        </label>

                        <input type="text" th:value="${appPermission.operationType}" class="form-control" readonly>

                    </div>

                    <div class="alert alert-info">

                        Composite primary key fields should usually not be edited.

                    </div>

                    <button type="submit" class="btn btn-warning">

                        Save

                    </button>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
