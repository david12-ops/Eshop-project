<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Permissions</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h1>Permissions</h1>

            <div class="d-flex gap-2">

                <a th:href="@{/}" class="btn btn-secondary">

                    Home

                </a>

                <a th:href="@{/app-permissions/create}" class="btn btn-primary">

                    Create Permission

                </a>

            </div>

        </div>

        <table class="table table-bordered table-striped">

            <thead>

                <tr>

                    <th>Role</th>
                    <th>Resource</th>
                    <th>Operation</th>
                    <th>Created At</th>
                    <th>Deleted</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

                <tr th:each="permission : ${appPermissions}">

                    <td th:text="${permission.role.roleName}"></td>

                    <td th:text="${permission.resourceType}"></td>

                    <td th:text="${permission.operationType}"></td>

                    <td th:text="${permission.createdAt}"></td>

                    <td th:text="${permission.deleted ? 'Deleted' : 'Active'}"></td>

                    <td>

                        <a th:href="@{/app-permissions/detail/{roleId}/{resourceType}/{operationType}
                        (
                            roleId=${permission.role.id},
                            resourceType=${permission.resourceType},
                            operationType=${permission.operationType}
                        )}" class="btn btn-info btn-sm">

                            Detail

                        </a>

                        <a th:href="@{/app-permissions/edit/{roleId}/{resourceType}/{operationType}
                        (
                            roleId=${permission.role.id},
                            resourceType=${permission.resourceType},
                            operationType=${permission.operationType}
                        )}" class="btn btn-warning btn-sm">

                            Edit

                        </a>

                        <form th:action="@{/app-permissions/delete/{roleId}/{resourceType}/{operationType}
                        (
                            roleId=${permission.role.id},
                            resourceType=${permission.resourceType},
                            operationType=${permission.operationType}
                        )}" method="post" style="display:inline-block">

                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                            <button type="submit" class="btn btn-danger btn-sm">

                                Delete

                            </button>

                        </form>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</body>

</html>
