<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <title>Home</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container-fluid">

            <a class="navbar-brand" th:href="@{/home}">

                E-Shop Admin

            </a>

            <div class="navbar-nav">

                <a class="nav-link" th:href="@{/products}">

                    Products

                </a>

                <a class="nav-link" th:href="@{/categories}">

                    Categories

                </a>

                <a class="nav-link" th:href="@{/users}">

                    Users

                </a>

                <a class="nav-link" th:href="@{/customers}">

                    Customers

                </a>

            </div>

            <form th:action="@{/logout}" method="post" class="d-flex ms-auto">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <button type="submit" class="btn btn-outline-light">

                    Logout

                </button>

            </form>

        </div>

    </nav>

    <div class="container mt-5">

        <div class="p-5 bg-light rounded-3 border">

            <h1 class="display-5">

                Welcome to Admin Panel

            </h1>

            <p class="lead">

                Spring Boot + Thymeleaf + PostgreSQL

            </p>

            <hr>

            <div class="mt-4">

                <a th:href="@{/products}" class="btn btn-primary me-2">

                    Manage Products

                </a>

                <a th:href="@{/categories}" class="btn btn-success me-2">

                    Manage Categories

                </a>

                <a th:href="@{/orders}" class="btn btn-warning me-2">

                    Manage Orders

                </a>

                <a th:href="@{/customers}" class="btn btn-info">

                    Manage Customers

                </a>

            </div>

        </div>

    </div>

</body>

</html>
