<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Create Order Status</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h2>Create Order Status</h2>

                    <a th:href="@{/orderStatuses}" class="btn btn-secondary">

                        Back

                    </a>

                </div>

                <form th:action="@{/orderStatuses/create}" th:object="${status}" method="post">

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="mb-3">

                        <label class="form-label">
                            Status Name
                        </label>

                        <input type="text" th:field="*{statusName}" class="form-control" required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Status Type
                        </label>

                        <select th:field="*{statusType}" class="form-select">

                            <option th:each="type : ${statusTypes}" th:value="${type}" th:text="${type}">
                            </option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Description
                        </label>

                        <textarea th:field="*{statusDescription}" class="form-control" rows="4"></textarea>

                    </div>

                    <button type="submit" class="btn btn-success">

                        Create Status

                    </button>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
