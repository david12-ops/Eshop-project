<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Order Status Detail</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h2>Order Status Detail</h2>

                    <a th:href="@{/orderStatuses}" class="btn btn-secondary">

                        Back

                    </a>

                </div>

                <table class="table table-bordered">

                    <tr>
                        <th>ID</th>
                        <td th:text="${orderStatus.id}"></td>
                    </tr>

                    <tr>
                        <th>Status Name</th>
                        <td th:text="${orderStatus.statusName}"></td>
                    </tr>

                    <tr>
                        <th>Status Type</th>
                        <td th:text="${orderStatus.statusType}"></td>
                    </tr>

                    <tr>
                        <th>Description</th>
                        <td th:text="${orderStatus.statusDescription}"></td>
                    </tr>

                    <tr>
                        <th>Created At</th>
                        <td th:text="${orderStatus.createdAt}"></td>
                    </tr>

                    <tr>
                        <th>Updated At</th>
                        <td th:text="${orderStatus.updatedAt}"></td>
                    </tr>

                    <tr>
                        <th>Deleted At</th>
                        <td th:text="${orderStatus.deletedAt != null ? orderStatus.deletedAt : '-'}"></td>
                    </tr>

                </table>

            </div>

        </div>

    </div>

</body>

</html>
