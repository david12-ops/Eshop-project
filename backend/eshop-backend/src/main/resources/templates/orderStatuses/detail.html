<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Order Status Detail</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h2>Order Status Detail</h2>

                    <a th:href="@{/orderStatuses}" class="btn btn-secondary">

                        Back

                    </a>

                </div>

                <table class="table table-bordered">

                    <tr>
                        <th>ID</th>
                        <td th:text="${status.id}"></td>
                    </tr>

                    <tr>
                        <th>Status Name</th>
                        <td th:text="${status.statusName}"></td>
                    </tr>

                    <tr>
                        <th>Status Type</th>
                        <td th:text="${status.statusType}"></td>
                    </tr>

                    <tr>
                        <th>Description</th>
                        <td th:text="${status.statusDescription}"></td>
                    </tr>

                    <tr>
                        <th>Created At</th>
                        <td th:text="${status.createdAt}"></td>
                    </tr>

                    <tr>
                        <th>Updated At</th>
                        <td th:text="${status.updatedAt}"></td>
                    </tr>

                </table>

                <div class="d-flex gap-2">

                    <a th:href="@{/orderStatuses/edit/{id}(id=${status.id})}" class="btn btn-warning">

                        Edit

                    </a>

                    <form th:action="@{/orderStatuses/delete/{id}(id=${status.id})}" method="post">

                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <button type="submit" class="btn btn-danger">

                            Delete

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
