<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Order Statuses</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">

            <div class="d-flex gap-2">

                <a href="javascript:history.back()" class="btn btn-secondary">

                    Back

                </a>

                <a th:href="@{/orderStatuses/create}" class="btn btn-primary">

                    Create Status

                </a>

            </div>

            <h1 class="mb-0">
                Order Statuses
            </h1>

        </div>

        <!-- TABLE -->
        <table class="table table-bordered table-striped table-hover align-middle">

            <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>Status Name</th>
                    <th>Status Type</th>
                    <th>Description</th>
                    <th>Created At</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

                <tr th:each="status : ${statuses}">

                    <td th:text="${status.id}"></td>

                    <td th:text="${status.statusName}"></td>

                    <td th:text="${status.statusType}"></td>

                    <td th:text="${status.statusDescription}"></td>

                    <td th:text="${status.createdAt}"></td>

                    <td>

                        <div class="d-flex gap-1">

                            <a th:href="@{/orderStatuses/detail/{id}(id=${status.id})}" class="btn btn-info btn-sm">

                                Detail

                            </a>

                            <a th:href="@{/orderStatuses/edit/{id}(id=${status.id})}" class="btn btn-warning btn-sm">

                                Edit

                            </a>

                            <form th:action="@{/orderStatuses/delete/{id}(id=${status.id})}" method="post">

                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                                <button type="submit" class="btn btn-danger btn-sm">

                                    Delete

                                </button>

                            </form>

                        </div>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</body>

</html>
