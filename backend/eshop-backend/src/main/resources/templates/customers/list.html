<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Customers</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h1>Customers</h1>

            <div class="d-flex gap-2">

                <a th:href="@{/}" class="btn btn-secondary">

                    Home

                </a>

                <a th:href="@{/customers/create}" class="btn btn-primary">

                    Create customer

                </a>

            </div>

        </div>

        <table class="table table-bordered table-striped">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Branch Name</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Phone Number</th>
                    <th>User</th>
                    <th>Deleted</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="customer : ${customers}">

                    <td th:text="${customer.customerId}"></td>

                    <td th:text="${customer.branchName}"></td>

                    <td th:text="${customer.firstName}"></td>

                    <td th:text="${customer.lastName}"></td>

                    <td th:text="${customer.phoneNumber}"></td>

                    <td th:text="${customer.customerUser != null ? customer.customerUser.username : '-'}"></td>

                    <td th:text="${customer.deleted ? 'Deleted' : 'Active'}"></td>

                    <td>

                        <a th:href="@{/customers/detail/{customerId}(customerId=${customer.customerId})}"
                            class="btn btn-info btn-sm">
                            Detail
                        </a>

                        <a th:href="@{/customers/edit/{customerId}(customerId=${customer.customerId})}"
                            class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <form th:action="@{/customers/delete/{customerId}(customerId=${customer.customerId})}"
                            method="post" style="display:inline-block">

                            <button type="submit" class="btn btn-danger btn-sm">
                                Delete
                            </button>

                        </form>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</body>

</html>
