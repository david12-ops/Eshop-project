<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Create Customer</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <h1>Create Customer</h1>

        <form th:action="@{/customers/create}" th:object="${customer}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="row">

                <div class="col-md-4 mb-3">

                    <label class="form-label">Branch Name</label>

                    <input type="text" class="form-control" th:field="*{branchName}">

                </div>

                <div class="col-md-4 mb-3">

                    <label class="form-label">First Name</label>

                    <input type="text" class="form-control" th:field="*{firstName}">

                </div>

                <div class="col-md-4 mb-3">

                    <label class="form-label">Last Name</label>

                    <input type="text" class="form-control" th:field="*{lastName}">

                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">Birth Date</label>

                    <input type="date" class="form-control" th:field="*{birthDate}">

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">Phone Number</label>

                    <input type="text" class="form-control" th:field="*{phoneNumber}">

                </div>

            </div>

            <div class="mb-3">

                <label class="form-label">Address</label>

                <select class="form-select" th:field="*{address}">

                    <option th:each="address : ${addresses}" th:value="${address.id}"
                        th:text="${address.streetName + ', ' + address.cityName}">
                    </option>

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">User</label>

                <select class="form-select" th:field="*{user}">

                    <option value="">No User</option>

                    <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.username}">
                    </option>

                </select>

            </div>

            <button type="submit" class="btn btn-success">
                Save
            </button>

            <a th:href="@{/customers}" class="btn btn-secondary">
                Back
            </a>

        </form>

    </div>

</body>

</html>
