<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Customer Detail</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <h1>Customer Detail</h1>

        <table class="table table-bordered">

            <tr>
                <th>ID</th>
                <td th:text="${customer.customerId}"></td>
            </tr>

            <tr>
                <th>Branch Name</th>
                <td th:text="${customer.branchName}"></td>
            </tr>

            <tr>
                <th>First Name</th>
                <td th:text="${customer.firstName}"></td>
            </tr>

            <tr>
                <th>Last Name</th>
                <td th:text="${customer.lastName}"></td>
            </tr>

            <tr>
                <th>Birth Date</th>
                <td th:text="${customer.birthDate}"></td>
            </tr>

            <tr>
                <th>Phone Number</th>
                <td th:text="${customer.phoneNumber}"></td>
            </tr>

            <tr>
                <th>Address</th>
                <td th:text="${customer.customerAddress != null ? customer.customerAddress.streetName : '-'}"></td>
            </tr>

            <tr>
                <th>User</th>
                <td th:text="${customer.customerUser != null ? customer.customerUser.username : '-'}"></td>
            </tr>

            <tr>
                <th>Created At</th>
                <td th:text="${customer.createdAt}"></td>
            </tr>

            <tr>
                <th>Updated At</th>
                <td th:text="${customer.updatedAt}"></td>
            </tr>

            <tr>
                <th>Deleted At</th>
                <td th:text="${customer.deletedAt != null ? customer.deletedAt : '-'}"></td>
            </tr>

        </table>

        <a th:href="@{/customers}" class="btn btn-secondary">
            Back
        </a>

    </div>

</body>

</html>
