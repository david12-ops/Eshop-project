<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Product Detail</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <h1>Product Detail</h1>

        <div class="mb-4">

            <img th:src="${product.productImageUrl}" class="img-fluid rounded" style="max-width:300px">

        </div>

        <table class="table table-bordered">

            <tr>
                <th>ID</th>
                <td th:text="${product.id}"></td>
            </tr>

            <tr>
                <th>Product Name</th>
                <td th:text="${product.productName}"></td>
            </tr>

            <tr>
                <th>Product Code</th>
                <td th:text="${product.productCode}"></td>
            </tr>

            <tr>
                <th>Description</th>
                <td th:text="${product.productDescription}"></td>
            </tr>

            <tr>
                <th>Recommended Price</th>
                <td th:text="${product.recommendedPrice}"></td>
            </tr>

            <tr>
                <th>Unit Price</th>
                <td th:text="${product.unitPrice}"></td>
            </tr>

            <tr>
                <th>Tax Rate</th>
                <td th:text="${product.taxRate + '%'}"></td>
            </tr>

            <tr>
                <th>Category</th>
                <td th:text="${product.category != null ? product.category.categoryName : '-'}"></td>
            </tr>

            <tr>
                <th>Active</th>
                <td th:text="${product.active ? 'Yes' : 'No'}"></td>
            </tr>

            <tr>
                <th>Created At</th>
                <td th:text="${product.createdAt}"></td>
            </tr>

            <tr>
                <th>Updated At</th>
                <td th:text="${product.updatedAt}"></td>
            </tr>

            <tr>
                <th>Deleted At</th>
                <td th:text="${product.deletedAt != null ? product.deletedAt : '-'}"></td>
            </tr>

        </table>

        <a th:href="@{/products}" class="btn btn-secondary">
            Back
        </a>

    </div>

</body>

</html>
