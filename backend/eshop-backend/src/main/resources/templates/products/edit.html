<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Edit Product</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <h1>Edit Product</h1>

        <form th:action="@{/products/edit/{id}(id=${product.id})}" th:object="${product}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="mb-3">

                <label class="form-label">Product Name</label>

                <input type="text" class="form-control" th:field="*{productName}">

            </div>

            <div class="mb-3">

                <label class="form-label">Product Code</label>

                <input type="text" class="form-control" th:field="*{productCode}">

            </div>

            <div class="mb-3">

                <label class="form-label">Description</label>

                <textarea class="form-control" rows="5" th:field="*{productDescription}">
            </textarea>

            </div>

            <div class="mb-3">

                <label class="form-label">Image URL</label>

                <input type="text" class="form-control" th:field="*{productImageUrl}">

            </div>

            <div class="row">

                <div class="col-md-4 mb-3">

                    <label class="form-label">Recommended Price</label>

                    <input type="number" step="0.01" class="form-control" th:field="*{recommendedPrice}">

                </div>

                <div class="col-md-4 mb-3">

                    <label class="form-label">Unit Price</label>

                    <input type="number" step="0.01" class="form-control" th:field="*{unitPrice}">

                </div>

                <div class="col-md-4 mb-3">

                    <label class="form-label">Tax Rate</label>

                    <input type="number" step="0.01" class="form-control" th:field="*{taxRate}">

                </div>

            </div>

            <div class="mb-3">

                <label class="form-label">Category</label>

                <select class="form-select" th:field="*{category}">

                    <option value="">Select category</option>

                    <option th:each="category : ${categories}" th:value="${category.id}"
                        th:text="${category.categoryName}">
                    </option>

                </select>

            </div>

            <div class="form-check mb-3">

                <input class="form-check-input" type="checkbox" th:field="*{active}">

                <label class="form-check-label">
                    Active
                </label>

            </div>

            <button type="submit" class="btn btn-success">
                Update
            </button>

            <a th:href="@{/products}" class="btn btn-secondary">
                Back
            </a>

        </form>

    </div>

</body>

</html>
