<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Products</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h1>Products</h1>

        <div class="d-flex gap-2">

            <a th:href="@{/}" class="btn btn-secondary">

                Home

            </a>

            <a th:href="@{/products/create}" class="btn btn-primary">

                Create Product

            </a>

        </div>

    </div>

    <table class="table table-bordered table-striped align-middle">

        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Code</th>
                <th>Unit Price</th>
                <th>Recommended Price</th>
                <th>Tax Rate</th>
                <th>Active</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="product : ${products}">

                <td th:text="${product.id}"></td>

                <td th:text="${product.productName}"></td>

                <td th:text="${product.productCode}"></td>

                <td th:text="${product.unitPrice}"></td>

                <td th:text="${product.recommendedPrice}"></td>

                <td th:text="${product.taxRate + '%'}"></td>

                <td>

                    <span th:if="${product.active}" class="badge bg-success">
                        Active
                    </span>

                    <span th:unless="${product.active}" class="badge bg-danger">
                        Inactive
                    </span>

                </td>

                <td>

                    <a th:href="@{/products/detail/{id}(id=${product.id})}" class="btn btn-info btn-sm">
                        Detail
                    </a>

                    <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-warning btn-sm">
                        Edit
                    </a>

                    <form th:action="@{/products/delete/{id}(id=${product.id})}" method="post"
                        style="display:inline-block">

                        <button type="submit" class="btn btn-danger btn-sm">
                            Delete
                        </button>

                    </form>

                </td>

            </tr>

        </tbody>

    </table>

    </div>

</body>

</html>
