<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Users</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h1>Users</h1>

            <div class="d-flex gap-2">

                <a th:href="@{/}" class="btn btn-secondary">

                    Home

                </a>

                <a th:href="@{/users/create}" class="btn btn-primary">

                    Create User

                </a>

            </div>

        </div>

        <table class="table table-bordered table-striped">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Created At</th>
                    <th>Deleted</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="user : ${users}">

                    <td th:text="${user.id}"></td>

                    <td th:text="${user.username}"></td>

                    <td th:text="${user.email}"></td>

                    <td th:text="${user.role.roleName}"></td>

                    <td th:text="${user.createdAt}"></td>

                    <td th:text="${user.deleted ? 'Deleted' : 'Active'}"></td>

                    <td>

                        <a th:href="@{/users/detail/{id}(id=${user.id})}" class="btn btn-info btn-sm">
                            Detail
                        </a>

                        <a th:href="@{/users/edit/{id}(id=${user.id})}" class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <form th:action="@{/users/delete/{id}(id=${user.id})}" method="post"
                            style="display:inline-block">

                            <button type="submit" class="btn btn-danger btn-sm">
                                Delete
                            </button>

                        </form>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</body>

</html>
