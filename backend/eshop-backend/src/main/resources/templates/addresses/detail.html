<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Address Detail</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h2>Address Detail</h2>

                    <a th:href="@{/addresses}" class="btn btn-secondary">

                        Back

                    </a>

                </div>

                <table class="table table-bordered">

                    <tr>
                        <th>ID</th>
                        <td th:text="${address.id}"></td>
                    </tr>

                    <tr>
                        <th>Street Name</th>
                        <td th:text="${address.streetName}"></td>
                    </tr>

                    <tr>
                        <th>City Name</th>
                        <td th:text="${address.cityName}"></td>
                    </tr>

                    <tr>
                        <th>State Name</th>
                        <td th:text="${address.stateName}"></td>
                    </tr>

                    <tr>
                        <th>Postal Code</th>
                        <td th:text="${address.postalCode}"></td>
                    </tr>

                    <tr>
                        <th>Country Name</th>
                        <td th:text="${address.countryName}"></td>
                    </tr>

                    <tr>
                        <th>Region</th>
                        <td th:text="${address.region != null ? address.region.regionName : '-'}"></td>
                    </tr>

                    <tr>
                        <th>Created At</th>
                        <td th:text="${address.createdAt}"></td>
                    </tr>

                    <tr>
                        <th>Updated At</th>
                        <td th:text="${address.updatedAt}"></td>
                    </tr>

                </table>

                <div class="d-flex gap-2">

                    <a th:href="@{/addresses/edit/{id}(id=${address.id})}" class="btn btn-warning">

                        Edit

                    </a>

                    <form th:action="@{/addresses/delete/{id}(id=${address.id})}" method="post">

                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <button type="submit" class="btn btn-danger">

                            Delete

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
