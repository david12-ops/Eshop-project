<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Addresses</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">

            <div class="d-flex gap-2">

                <a href="javascript:history.back()" class="btn btn-secondary">

                    Back

                </a>

                <a th:href="@{/addresses/create}" class="btn btn-primary">

                    Create Address

                </a>

            </div>

            <h1 class="mb-0">
                Addresses
            </h1>

        </div>

        <!-- TABLE -->
        <table class="table table-bordered table-striped table-hover align-middle">

            <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>Street</th>
                    <th>City</th>
                    <th>State</th>
                    <th>Postal Code</th>
                    <th>Country</th>
                    <th>Region</th>
                    <th>Created At</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

                <tr th:each="address : ${addresses}">

                    <td th:text="${address.id}"></td>

                    <td th:text="${address.streetName}"></td>

                    <td th:text="${address.cityName}"></td>

                    <td th:text="${address.stateName}"></td>

                    <td th:text="${address.postalCode}"></td>

                    <td th:text="${address.countryName}"></td>

                    <td th:text="${address.region != null ? address.region.regionName : '-'}"></td>

                    <td th:text="${address.createdAt}"></td>

                    <td>

                        <div class="d-flex gap-1">

                            <a th:href="@{/addresses/detail/{id}(id=${address.id})}" class="btn btn-info btn-sm">

                                Detail

                            </a>

                            <a th:href="@{/addresses/edit/{id}(id=${address.id})}" class="btn btn-warning btn-sm">

                                Edit

                            </a>

                            <form th:action="@{/addresses/delete/{id}(id=${address.id})}" method="post">

                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                                <button type="submit" class="btn btn-danger btn-sm">

                                    Delete

                                </button>

                            </form>

                        </div>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</body>

</html>
