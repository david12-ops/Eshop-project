<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Edit Category</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <h1>Edit Category</h1>

        <form th:action="@{/categories/edit/{id}(id=${category.id})}" th:object="${category}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="mb-3">

                <label class="form-label">Category Name</label>

                <input type="text" class="form-control" th:field="*{categoryName}">

            </div>

            <div class="mb-3">

                <label class="form-label">Description</label>

                <textarea class="form-control" rows="5" th:field="*{categoryDescription}">
            </textarea>

            </div>

            <div class="form-check mb-3">

                <input class="form-check-input" type="checkbox" th:field="*{active}">

                <label class="form-check-label">
                    Active
                </label>

            </div>

            <button type="submit" class="btn btn-success">
                Update
            </button>

            <a th:href="@{/categories}" class="btn btn-secondary">
                Back
            </a>

        </form>

    </div>

</body>

</html>
