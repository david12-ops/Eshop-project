<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Categories</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h1>Categories</h1>

            <div class="d-flex gap-2">

                <a th:href="@{/}" class="btn btn-secondary">

                    Home

                </a>

                <a th:href="@{/categories/create}" class="btn btn-primary">

                    Create Category

                </a>

            </div>

        </div>
        <table class="table table-bordered table-striped">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Category Name</th>
                    <th>Description</th>
                    <th>Active</th>
                    <th>Created At</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="category : ${categories}">

                    <td th:text="${category.id}"></td>

                    <td th:text="${category.categoryName}"></td>

                    <td th:text="${category.categoryDescription}"></td>

                    <td>

                        <span th:if="${category.active}" class="badge bg-success">
                            Active
                        </span>

                        <span th:unless="${category.active}" class="badge bg-danger">
                            Inactive
                        </span>

                    </td>

                    <td th:text="${category.createdAt}"></td>

                    <td>

                        <a th:href="@{/categories/detail/{id}(id=${category.id})}" class="btn btn-info btn-sm">
                            Detail
                        </a>

                        <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <form th:action="@{/categories/delete/{id}(id=${category.id})}" method="post"
                            style="display:inline-block">

                            <button type="submit" class="btn btn-danger btn-sm">
                                Delete
                            </button>

                        </form>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</body>

</html>
