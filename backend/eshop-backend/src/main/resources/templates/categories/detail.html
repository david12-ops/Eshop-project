<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Category Detail</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <h1>Category Detail</h1>

        <table class="table table-bordered">

            <tr>
                <th>ID</th>
                <td th:text="${category.id}"></td>
            </tr>

            <tr>
                <th>Category Name</th>
                <td th:text="${category.categoryName}"></td>
            </tr>

            <tr>
                <th>Description</th>
                <td th:text="${category.categoryDescription}"></td>
            </tr>

            <tr>
                <th>Active</th>
                <td th:text="${category.active ? 'Yes' : 'No'}"></td>
            </tr>

            <tr>
                <th>Created At</th>
                <td th:text="${category.createdAt}"></td>
            </tr>

            <tr>
                <th>Updated At</th>
                <td th:text="${category.updatedAt}"></td>
            </tr>

            <tr>
                <th>Created By</th>
                <td th:text="${category.createdBy}"></td>
            </tr>

            <tr>
                <th>Updated By</th>
                <td th:text="${category.updatedBy}"></td>
            </tr>

            <tr>
                <th>Deleted At</th>
                <td th:text="${category.deletedAt != null ? category.deletedAt : '-'}"></td>
            </tr>

        </table>

        <a th:href="@{/categories}" class="btn btn-secondary">
            Back
        </a>

    </div>

</body>

</html>
