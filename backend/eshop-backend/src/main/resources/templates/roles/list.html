<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Roles</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h1>Roles</h1>

            <div class="d-flex gap-2">

                <a href="javascript:history.back()" class="btn btn-secondary">

                    Back

                </a>

                <a th:href="@{/roles/create}" class="btn btn-primary">

                    Create Role

                </a>

            </div>

        </div>

        <table class="table table-bordered table-striped">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Role Name</th>
                    <th>Role Type</th>
                    <th>Description</th>
                    <th>Created At</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="role : ${roles}">

                    <td th:text="${role.id}"></td>

                    <td th:text="${role.roleName}"></td>

                    <td th:text="${role.roleType}"></td>

                    <td th:text="${role.roleDescription}"></td>

                    <td th:text="${role.createdAt}"></td>

                    <td>

                        <a th:href="@{/roles/detail/{id}(id=${role.id})}" class="btn btn-info btn-sm">
                            Detail
                        </a>

                        <a th:href="@{/roles/edit/{id}(id=${role.id})}" class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <form th:action="@{/roles/delete/{id}(id=${role.id})}" method="post"
                            style="display:inline-block">

                            <button type="submit" class="btn btn-danger btn-sm">
                                Delete
                            </button>

                        </form>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</body>

</html>
