<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Create Role</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <h1>Create Role</h1>

        <form th:action="@{/roles/create}" th:object="${role}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="mb-3">

                <label class="form-label">Role Name</label>

                <input type="text" class="form-control" th:field="*{roleName}">

            </div>

            <div class="mb-3">

                <label class="form-label">Role Type</label>

                <select class="form-select" th:field="*{roleType}">

                    <option th:each="type : ${roleTypes}" th:value="${type}" th:text="${type}">
                    </option>

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">Description</label>

                <textarea class="form-control" th:field="*{roleDescription}">
            </textarea>

            </div>

            <button type="submit" class="btn btn-success">
                Save
            </button>

            <a th:href="@{/roles}" class="btn btn-secondary">
                Back
            </a>

        </form>

    </div>

</body>

</html>
