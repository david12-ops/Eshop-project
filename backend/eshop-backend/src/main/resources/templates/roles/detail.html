<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Role Detail</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <h1>Role Detail</h1>

        <table class="table table-bordered">

            <tr>
                <th>ID</th>
                <td th:text="${role.id}"></td>
            </tr>

            <tr>
                <th>Role Name</th>
                <td th:text="${role.roleName}"></td>
            </tr>

            <tr>
                <th>Role Type</th>
                <td th:text="${role.roleType}"></td>
            </tr>

            <tr>
                <th>Description</th>
                <td th:text="${role.roleDescription}"></td>
            </tr>

            <tr>
                <th>Created At</th>
                <td th:text="${role.createdAt}"></td>
            </tr>

            <tr>
                <th>Updated At</th>
                <td th:text="${role.updatedAt}"></td>
            </tr>

            <tr>
                <th>Created By</th>
                <td th:text="${role.createdBy}"></td>
            </tr>

            <tr>
                <th>Updated By</th>
                <td th:text="${role.updatedBy}"></td>
            </tr>

            <tr>
                <th>Deleted At</th>
                <td th:text="${role.deletedAt != null ? role.deletedAt : '-'}"></td>
            </tr>

        </table>

        <a th:href="@{/roles}" class="btn btn-secondary">
            Back
        </a>

    </div>

</body>

</html>
