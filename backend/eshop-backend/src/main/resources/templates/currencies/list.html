<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Currencies</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h1>Currencies</h1>

            <div class="d-flex gap-2">

                <a th:href="@{/}" class="btn btn-secondary">

                    Home

                </a>

                <a th:href="@{/currencies/create}" class="btn btn-primary">
                    Create Currency
                </a>

            </div>

        </div>

        <table class="table table-bordered table-striped">

            <thead>
                <tr>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Symbol</th>
                    <th>Created At</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="currency : ${currencies}">

                    <td th:text="${currency.currencyCode}"></td>

                    <td th:text="${currency.currencyName}"></td>

                    <td th:text="${currency.symbol}"></td>

                    <td th:text="${currency.createdAt}"></td>

                    <td>

                        <a th:href="@{/currencies/detail/{id}(id=${currency.currencyCode})}"
                            class="btn btn-info btn-sm">
                            Detail
                        </a>

                        <a th:href="@{/currencies/edit/{id}(id=${currency.currencyCode})}"
                            class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <form th:action="@{/currencies/delete/{id}(id=${currency.currencyCode})}" method="post"
                            style="display:inline-block">

                            <button type="submit" class="btn btn-danger btn-sm">

                                Delete

                            </button>

                        </form>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</body>

</html>
