<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Create Currency</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h1>Create Currency</h1>

            <a href="javascript:history.back()" class="btn btn-secondary">
                Back
            </a>

        </div>

        <div class="card">

            <div class="card-body">

                <form th:action="@{/currencies/create}" th:object="${currency}" method="post">

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="mb-3">

                        <label class="form-label">
                            Currency Code
                        </label>

                        <input type="text" th:field="*{currencyCode}" class="form-control" maxlength="3" required>

                        <div class="form-text">
                            Example: USD, EUR, CZK
                        </div>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Currency Name
                        </label>

                        <input type="text" th:field="*{currencyName}" class="form-control" maxlength="50" required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Symbol
                        </label>

                        <input type="text" th:field="*{symbol}" class="form-control" maxlength="8">

                    </div>

                    <button type="submit" class="btn btn-success">

                        Create

                    </button>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
