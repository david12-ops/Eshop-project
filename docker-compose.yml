services:
  database:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend/eshop-backend
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      - database

  frontend:
    build: ./frontend/eshop-frontend
    ports:
      - "5173:5173"
    working_dir: /app
    command: sh -c "npm run dev -- --host"
    volumes:
      - ./frontend/eshop-frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  db_data:
